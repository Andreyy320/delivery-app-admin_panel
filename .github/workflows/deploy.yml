name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main  # Если твоя ветка называется master, замени main на master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Используем самую свежую версию для поддержки Dart 3.8.1+
          flutter-version: '3.29.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        # Флаг --web-renderer html чинит отображение картинок в браузере
        run: flutter build web --web-renderer html --release

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: food-delivery-app-c9657